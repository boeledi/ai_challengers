# =============================================================================
# AI Provocateurs — Model Configuration
# =============================================================================
# Each model definition specifies: provider adapter, model ID, endpoint,
# API key environment variable, and maximum output token capacity (ceiling).
# The actual tokens requested per call are determined by token_budgets (below),
# not by max_tokens. max_tokens is a per-model ceiling only.
# =============================================================================

models:
  # ---------------------------------------------------------------------------
  # Direct providers
  # ---------------------------------------------------------------------------
  claude-opus:
    provider: anthropic
    model_id: claude-opus-4-20250514
    endpoint: https://api.anthropic.com/v1/messages
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 16384
    thinking_levels: [low, medium, high]
    default_thinking: medium

  claude-sonnet:
    provider: anthropic
    model_id: claude-sonnet-4-20250514
    endpoint: https://api.anthropic.com/v1/messages
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 16384
    thinking_levels: [low, high]
    default_thinking: low

  gpt-5-4:
    provider: openai_compat
    model_id: gpt-5.4
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    max_tokens: 16384

  gpt-4-1:
    provider: openai_compat
    model_id: gpt-4.1
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    max_tokens: 16384

  gemini:
    provider: google
    model_id: gemini-2.5-pro
    endpoint: https://generativelanguage.googleapis.com/v1beta/models
    api_key_env: GOOGLE_API_KEY
    max_tokens: 16384

  grok:
    provider: openai_compat
    model_id: grok-3
    endpoint: https://api.x.ai/v1/chat/completions
    api_key_env: XAI_API_KEY
    max_tokens: 16384

  mistral-large:
    provider: openai_compat
    model_id: mistral-large-latest
    endpoint: https://api.mistral.ai/v1/chat/completions
    api_key_env: MISTRAL_API_KEY
    max_tokens: 16384

  deepseek:
    provider: openai_compat
    model_id: deepseek-chat
    endpoint: https://api.deepseek.com/chat/completions
    api_key_env: DEEPSEEK_API_KEY
    max_tokens: 8192

  deepseek-r1:
    provider: openai_compat
    model_id: deepseek-reasoner
    endpoint: https://api.deepseek.com/chat/completions
    api_key_env: DEEPSEEK_API_KEY
    max_tokens: 8192

  # ---------------------------------------------------------------------------
  # Aggregators (1 API key = access to many models)
  # ---------------------------------------------------------------------------
  openrouter-claude:
    provider: openai_compat
    model_id: anthropic/claude-opus-4-6
    endpoint: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    max_tokens: 16384

  openrouter-gpt:
    provider: openai_compat
    model_id: openai/gpt-4.1
    endpoint: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    max_tokens: 16384

  openrouter-gemini:
    provider: openai_compat
    model_id: google/gemini-2.5-pro
    endpoint: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    max_tokens: 16384

  openrouter-llama:
    provider: openai_compat
    model_id: meta-llama/llama-4-maverick
    endpoint: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    max_tokens: 16384

  zai-default:
    provider: openai_compat
    model_id: default
    endpoint: https://api.z.ai/v1/chat/completions
    api_key_env: ZAI_API_KEY
    max_tokens: 16384

  # ---------------------------------------------------------------------------
  # Custom model template (uncomment and edit)
  # ---------------------------------------------------------------------------
  # my-model:
  #   provider: openai_compat
  #   model_id: the-model-id
  #   endpoint: https://my-provider.com/v1/chat/completions
  #   api_key_env: MY_API_KEY
  #   max_tokens: 16384
  #
  # Local model via Ollama/LM Studio:
  # local-llama:
  #   provider: openai_compat
  #   model_id: llama3
  #   endpoint: http://localhost:11434/v1/chat/completions
  #   api_key_env: OLLAMA_API_KEY   # often "ollama" or any string
  #   max_tokens: 8192

# =============================================================================
# Token budgets per role
# =============================================================================
# These control the actual max_tokens sent in each API call.
# Effective max_tokens = min(token_budgets[role], model.max_tokens)
# =============================================================================

token_budgets:
  # --- /deliberate roles ---
  advisor: 2048              # Initial advisor response (150-300 words)
  deliberation_round: 3072   # Refined response after seeing others (Step 5)
  peer_reviewer: 2048        # Anonymous peer review (Step 7)
  chairman: 8192             # Final synthesis (Step 8)
  chairman_no_review: 6144   # Chairman for modes without peer review (redteam, premortem, advocate)
  probe: 2048                # SENTINEL meta-persona (compass mode)

  # --- /analyze roles ---
  reader: 4096               # Structured summary of document (Step 2)
  analyze_reviewer: 3072     # Critical analysis of summary (Step 3)
  researcher: 4096           # Gap investigation (Step 4)
  summarizer: 8192           # Final synthesis (Step 5)
  qa_generator: 8192         # Q&A pair generation (Step 6)

  # Default for any unspecified role
  default: 4096

# =============================================================================
# Skill defaults
# =============================================================================

defaults:
  deliberate:
    preferred_models: [claude-opus, gpt, gemini, grok, claude-sonnet]
    chairman: claude-opus
    default_rounds: 1
    default_mode: council
  analyze:
    roles:
      reader: claude-opus
      reviewer: gpt
      researcher: gemini
      summarizer: claude-sonnet

# =============================================================================
# Fallback strategy
# =============================================================================

fallback:
  strategy: thinking_levels
  # When fewer distinct models are available than slots needed,
  # duplicate models with different thinking levels.
  # Minimum viable quorum: 1 model with 3 thinking level variants
  # OR 2 distinct models.

# =============================================================================
# Timeouts (seconds)
# =============================================================================

timeouts:
  connect: 10
  read: 120
  chairman: 180
  total_session: 600

# =============================================================================
# Rate limits per provider (for parallel calls)
# =============================================================================

rate_limits:
  anthropic:
    max_concurrent: 3
    min_delay_between_ms: 500
  openai:
    max_concurrent: 5
    min_delay_between_ms: 200
  google:
    max_concurrent: 3
    min_delay_between_ms: 300
  openai_compat:   # default for xAI, Mistral, DeepSeek, OpenRouter, z.ai
    max_concurrent: 3
    min_delay_between_ms: 500

# =============================================================================
# Cost control (optional)
# =============================================================================

cost_control:
  estimate_before_run: true
  confirm_above_usd: 1.00
  hard_cap_usd: 5.00
  track_daily: true
  daily_budget_usd: 20.00

  # Pricing uses config model keys (not model_id), matched via models.yaml
  pricing_per_million_tokens:
    claude-opus: { input: 15.0, output: 75.0 }
    claude-sonnet: { input: 3.0, output: 15.0 }
    gpt-5-4: { input: 2.5, output: 15.0 }
    gpt-4-1: { input: 2.0, output: 8.0 }
    gemini: { input: 1.25, output: 10.0 }
    grok: { input: 5.0, output: 15.0 }
    mistral-large: { input: 2.0, output: 6.0 }
    deepseek: { input: 0.27, output: 1.10 }
    deepseek-r1: { input: 0.55, output: 2.19 }
    default: { input: 2.0, output: 8.0 }
